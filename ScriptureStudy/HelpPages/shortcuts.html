<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Keyboard Shortcuts</title>
<link rel="stylesheet" href="style.css"></head><body><article>
<h1>Keyboard Shortcuts</h1>
<p class="subtitle">Quick access to common actions</p>
<table>
<tr><th>Shortcut</th><th>Action</th></tr>
<tr><td><kbd>⌘/</kbd></td><td>Open Help</td></tr>
<tr><td><kbd>⌘B</kbd></td><td>Bold (in note editor)</td></tr>
<tr><td><kbd>⌘I</kbd></td><td>Italic (in note editor)</td></tr>
<tr><td><kbd>⌘⇧H</kbd></td><td>Heading (in note editor)</td></tr>
<tr><td><kbd>⌘⇧L</kbd></td><td>Bullet list (in note editor)</td></tr>
<tr><td><kbd>⌘+</kbd></td><td>Increase font size (in note editor)</td></tr>
<tr><td><kbd>⌘-</kbd></td><td>Decrease font size (in note editor)</td></tr>
</table>
</article></body></html>
